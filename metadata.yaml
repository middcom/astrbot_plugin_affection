name: astrbot_plugin_affection # 插件唯一识别名，以 astrbot_plugin_ 前缀开头
display_name: 情绪管理 # 用于展示的名字，可以是方便人类阅读的名字（需要版本 >= v4.5.0，低版本不会报错，请放心填写）
desc: 一个基于弗洛伊德心理动力学引入双驱情绪模型的 AstrBot 插件。它模拟了力比多（生本能/爱欲）与攻击性（死本能/毁灭欲）之间的相互作用。机器人的回复与交互将根据这两种核心心理能量的浮动平衡而动态演变，提供独特的、基于心理学基础的陪伴体验。 # 插件简短描述
version: v1.1 # 插件版本号。格式：v1.1.1 或者 v1.1
author: middcom,dream,deepseek # 作者
repo: https://github.com/middcom/astrbot_plugin_affection # 插件的仓库地址
